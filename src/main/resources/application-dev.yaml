spring:
  datasource:
    url: jdbc:postgresql://localhost:5435/payment_db
    username: postgres
    password: root

    hikari:
      pool-name: PaymentService-HikariPool
      minimum-idle: 1
      maximum-pool-size: 5
      connection-timeout: 30000
      validation-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000

  rabbitmq:
    host: localhost
    port: 5672
    username: book_user
    password: book_password
    connection-timeout: 10s

management:
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans


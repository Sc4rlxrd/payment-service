server:
  port: 8083

spring:
  application:
    name: payment-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true

  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: ${spring.application.name}

  tracing:
    sampling:
      probability: 1.0

logging:
  pattern:
    correlation: "[traceId=%X{traceId:-} spanId=%X{spanId:-} orderId=%X{orderId:-}] "

springdoc:
  api-docs:
    path: /v3/api-docs

